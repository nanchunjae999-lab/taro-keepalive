name: keepalive
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Empty commit to keep scheduled workflows enabled
        run: |
          git config user.name "keepalive-bot"
          git config user.email "keepalive-bot@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: monthly activity commit"
          git push
